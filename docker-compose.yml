services:
  db:
    image: postgres:16
    container_name: infratrack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: infratrack
      POSTGRES_USER: infratrack_user
      POSTGRES_PASSWORD: infratrack_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
